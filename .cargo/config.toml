# Cargo configuration for Discord Qt Client
# Qt/C++ linking for desktop; iOS uses default toolchain

[target.x86_64-unknown-linux-gnu]
linker = "g++"
rustflags = ["-C", "linker=g++"]

[env]
CXX = "g++"
CC = "gcc"
